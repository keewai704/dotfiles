source = colors.conf

# Generic first-boot monitor. Put personal monitor layouts above this line
# after installing if you want fixed positions, refresh rates, or transforms.
monitor = , preferred, auto, 1

$mainMod = SUPER
$terminal = foot
$fileManager = thunar
$menu = wofi --show drun -n
$browser = zen-browser
$editor = nvim

# Session environment
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QUICK_CONTROLS_STYLE,Material
env = QT_QUICK_CONTROLS_MATERIAL_THEME,Dark
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# Fcitx5 input method
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
env = QT_IM_MODULES,wayland;fcitx;ibus
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus

exec-once = mkdir -p ~/Screenshots
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Materia-dark
exec-once = fcitx5 -d
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server -s ~/.config/swayosd/style.css
exec-once = waybar
exec-once = swaync
exec-once = swaync-client -df
exec-once = pypr
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = hypridle
exec-once = sh -c 'if command -v swww-daemon >/dev/null 2>&1; then swww-daemon; elif command -v awww-daemon >/dev/null 2>&1; then awww-daemon; fi'
exec-once = sleep .5 && sh -c 'if command -v swww >/dev/null 2>&1; then swww restore; elif command -v awww >/dev/null 2>&1; then awww restore; fi'

# NVIDIA users can uncomment these if VA-API/OpenGL pick the wrong driver.
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $color9 $color13 45deg
    col.inactive_border = $color8
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = 1
    inactive_opacity = 0.80
    fullscreen_opacity = 1
    dim_inactive = false

    blur {
        enabled = true
        size = 3
        passes = 3
        ignore_opacity = true
        xray = false
        popups = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = rgba(00000055)
    }
}

animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    focus_on_activate = true
}

xwayland {
    force_zero_scaling = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# Per-device override kept from the original config.
device {
    name = epic-mouse-v1
    sensitivity = 0
}

# Launchers and session controls
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, W, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, E, exec, wlogout -b 2
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, M, exit

# Window actions
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Focus, move, and resize
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40
binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0 40

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, bracketleft, workspace, e-1
bind = $mainMod, bracketright, workspace, e+1
bind = $mainMod, Tab, workspace, previous
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, grave, togglespecialworkspace, scratch
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratch
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scratchpads
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, G, exec, pypr toggle music
bind = $mainMod, T, exec, $terminal

# Utilities
bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT, W, exec, ~/.config/hypr/wallpaper.sh
bind = ALT, A, exec, ~/.config/waybar/scripts/refresh.sh
bind = ALT, B, exec, ~/.config/waybar/scripts/select.sh
bind = ALT, R, exec, ~/.config/swaync/refresh.sh
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, X, exec, ~/.config/waybar/scripts/colorpicker.sh

# Screenshots
bind = , Print, exec, hyprshot -m region -o ~/Screenshots
bind = SHIFT, Print, exec, hyprshot -m window -o ~/Screenshots
bind = CTRL, Print, exec, hyprshot -m output -o ~/Screenshots

# Media keys
binde = ALT, Page_Up, exec, ~/.config/hypr/brightness.sh up
binde = ALT, Page_Down, exec, ~/.config/hypr/brightness.sh down
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness +5
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness -5
bind = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bind = , XF86AudioNext, exec, swayosd-client --playerctl next
bind = , XF86AudioPrev, exec, swayosd-client --playerctl previous
bind = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock

gesture = 3, horizontal, workspace

windowrule {
    name = float-tools
    match:class = (pavucontrol|blueman-manager|nm-connection-editor|nwg-look)
    float = true
    center = true
    size = 900 600
}

windowrule {
    name = picture-in-picture
    match:title = Picture-in-Picture
    float = true
    pin = true
    keep_aspect_ratio = true
}

windowrule {
    name = scratchpad-term
    match:class = kitty-dropterm
    float = true
    center = true
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.3, match:namespace swaync-notification-window

layerrule = no_anim on, match:namespace selection

layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd
