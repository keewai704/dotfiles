general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

listener {
    timeout = 840
    on-timeout = wallpaper="/home/$USER/wallpapers/pywallpaper.jpg"; [ -f "/home/$USER/.cache/wal/colors.sh" ] && . "/home/$USER/.cache/wal/colors.sh"; notify-send "System" "Locking soon" -i "$wallpaper"
}
listener {
    timeout = 900
    on-timeout = loginctl lock-session
    on-resume = wallpaper="/home/$USER/wallpapers/pywallpaper.jpg"; [ -f "/home/$USER/.cache/wal/colors.sh" ] && . "/home/$USER/.cache/wal/colors.sh"; notify-send "System" "Unlocked. Hey $USER" -i "$wallpaper"
}

listener {
    timeout = 1200
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
